<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página en mantenimiento de BINeX Logistics">
    <title>BINeX Logistics</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f7f6;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }

        .logo img {
            max-width: 180px;
            height: auto;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #d32f2f;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: #555;
        }

        .contact-info {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-weight: bold;
            color: #003366;
        }

        .contact-info a {
            color: #003366;
            text-decoration: none;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }

        .instagram-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #E1306C;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        .instagram-btn:hover {
            background-color: #c72a5c;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- LOGO (usa tu imagen aquí) -->
        <div class="logo">
            <img src="BINEX_LOGO.PNG" alt="Logo BINeX Logistics">
        </div>

        <h1>Disculpe las molestias</h1>

        <p>
            Estamos trabajando para ofrecerle la mejor experiencia en servicios logísticos.
        </p>

        <div class="contact-info">
            Contacto: 
            <a href="mailto:contacto@binexlogistics.com">
                contacto@binexlogistics.com
            </a>
        </div>

        <!-- BOTÓN INSTAGRAM -->
        .instagram-btn {
    box-shadow: 0 4px 10px rgba(225,48,108,0.3);
}
        <a class="instagram-btn" href="https://instagram.com/tuusuario" target="_blank">
            Síguenos en Instagram
        </a>

    </div>

</body>
</html>
