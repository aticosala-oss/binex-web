<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página en mantenimiento de BINeX Logistics">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
	<meta name="google-site-verification" content="5g5o3_7_CUUY88n7bod3Y-XVM1bzU9PA7m6JcvdvuJQ" />
    <title>BINeX Logistics</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #eef2f3, #dfe9f3);
            color: #333;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
			border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }

        .logo img {
            max-width: 100%; /* Ajustado para que no se salga */
            height: auto;
            margin-top: -20px; /* Sube la imagen */
            margin-bottom: -30px; /* Sube el texto de abajo */
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #d32f2f;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: #555;
        }

        .contact-info {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-weight: bold;
            color: #003366;
        }

        .contact-info a {
            color: #003366;
            text-decoration: none;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }

        .instagram-icon {
            display: inline-block;
            margin-top: 10px;
            font-size: 35px !important; /* Tamaño más visible */
            color: #555 !important; /* Gris oscuro para que no sea azul */
            transition: transform 0.3s, color 0.3s;
            text-decoration: none !important;
        }

        .instagram-icon:hover {
            transform: scale(1.2); 
            color: #E1306C !important; /* Color corporativo de Instagram al pasar el ratón */
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- LOGO (usa tu imagen aquí) -->
        <div class="logo">
            <img src="BINEX_LOGO.PNG" alt="Logo BINeX Logistics">
        </div>

        <h1>Disculpe las molestias</h1>

        <p>
            Estamos trabajando para ofrecerle la mejor experiencia en servicios logísticos.
        </p>

        <div class="contact-info">
            Contacto: 
            <a href="mailto:contacto@binexlogistics.com">
                contacto@binexlogistics.com
            </a>
        </div>

        <!-- BOTÓN INSTAGRAM -->
        <a class="instagram-icon" href="https://www.instagram.com/binex_logistics" target="_blank">
			<i class="fab fa-instagram"></i>
		</a>

    </div>

</body>
</html>
